<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Layout Generator</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Instrument+Serif:ital@0;1&amp;family=DM+Sans:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <script>
tailwind.config={theme:{extend:{fontFamily:{serif:['Instrument Serif','Georgia','serif'],mono:['Space Mono','monospace'],sans:['DM Sans','sans-serif']}}}}
</script>
  <style>
html,body{height:100%;margin:0}
*{box-sizing:border-box}
.fade-in{animation:fadeIn .6s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .5s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.stagger-1{animation-delay:.1s}
.stagger-2{animation-delay:.2s}
.stagger-3{animation-delay:.3s}
.stagger-4{animation-delay:.4s}
.stagger-5{animation-delay:.5s}
.stagger-6{animation-delay:.6s}
input::placeholder{color:#999}
textarea::placeholder{color:#999}
.gen-btn{transition:all .3s cubic-bezier(.4,0,.2,1)}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.15)}
.layout-enter{animation:layoutReveal .8s cubic-bezier(.16,1,.3,1) both}
@keyframes layoutReveal{from{opacity:0;transform:scale(.96) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
#outputPreviewContainer{aspect-ratio:4/5;width:100%;max-width:420px;border-radius:12px;border:2px solid rgba(163,230,53,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.4);background:#fafaf9;display:block}
#outputPreview{width:100%;height:100%;display:block}
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-neutral-950 text-white font-sans overflow-auto">
  <div id="app" class="h-full w-full flex flex-col">
   <!-- HEADER -->
   <header class="px-6 py-5 flex items-center justify-between border-b border-white/5 flex-shrink-0">
    <div class="flex items-center gap-3">
     <div class="w-8 h-8 bg-lime-400 rounded-lg flex items-center justify-center">
      <i data-lucide="layout-grid" class="w-4 h-4 text-neutral-950"></i>
     </div>
     <h1 id="appTitle" class="font-mono text-sm tracking-wider uppercase text-white/80">AI Layout Generator</h1>
    </div><span class="text-[10px] font-mono text-white/30 tracking-widest uppercase">Composition Engine v1</span>
   </header><!-- MAIN -->
   <div class="flex-1 flex flex-col lg:flex-row overflow-auto">
    <!-- INPUT PANEL -->
    <div id="inputPanel" class="w-full lg:w-[420px] flex-shrink-0 border-r border-white/5 overflow-auto p-6">
     <div class="mb-6">
      <p class="text-xs font-mono text-lime-400/70 uppercase tracking-widest mb-1">Input Konten</p>
      <p class="text-white/40 text-xs">Isi konten, sistem akan memilih komposisi terbaik.</p>
     </div>
     <div class="space-y-4">
      <div class="fade-in stagger-1">
       <label for="inp-judul" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Judul</label> <input id="inp-judul" type="text" placeholder="Headline utama..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-400/50 transition">
      </div>
      <div class="fade-in stagger-2">
       <label for="inp-subjudul" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Subjudul</label> <input id="inp-subjudul" type="text" placeholder="Kalimat pendukung..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-400/50 transition">
      </div>
      <div class="fade-in stagger-3">
       <label for="inp-deskripsi" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Deskripsi</label> <textarea id="inp-deskripsi" rows="3" placeholder="Paragraf deskripsi..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-400/50 transition resize-none"></textarea>
      </div>
      <div class="fade-in stagger-4 flex gap-3">
       <div class="flex-1">
        <label for="inp-cta" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">CTA</label> <input id="inp-cta" type="text" placeholder="Teks tombol..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-400/50 transition">
       </div>
       <div class="flex-1">
        <label for="inp-info" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Info Kecil</label> <input id="inp-info" type="text" placeholder="Label / badge..." class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-400/50 transition">
       </div>
      </div>
      <div class="fade-in stagger-5">
       <label for="inp-gambar" class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Gambar Utama</label>
       <div class="relative"><input id="inp-gambar-file" type="file" accept="image/*" class="hidden"> <button type="button" onclick="document.getElementById('inp-gambar-file').click()" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white/60 hover:border-lime-400/30 transition text-left flex items-center gap-2"><i data-lucide="upload" class="w-4 h-4 flex-shrink-0"></i> <span id="fileLabel">Pilih Gambar...</span> </button>
       </div>
       <div id="imagePreview" class="mt-3 hidden rounded-lg overflow-hidden border border-white/10 bg-white/[.02] p-2"><img id="previewImg" class="w-full h-32 object-cover rounded" alt="Preview"> <button type="button" onclick="clearImage()" class="w-full mt-2 text-xs text-white/40 hover:text-white/60 transition py-1">Hapus Gambar</button>
       </div>
      </div><!-- Color pickers -->
      <div class="fade-in stagger-5 flex gap-3">
       <div class="flex-1">
        <label class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Warna Aksen</label> <input id="inp-accent" type="color" value="#a3e635" class="w-full h-10 bg-white/5 border border-white/10 rounded-lg cursor-pointer">
       </div>
       <div class="flex-1">
        <label class="block text-[10px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Warna Background</label> <input id="inp-bg" type="color" value="#fafaf9" class="w-full h-10 bg-white/5 border border-white/10 rounded-lg cursor-pointer">
       </div>
      </div>
      <div class="fade-in stagger-6 pt-2 space-y-2">
       <button id="generateBtn" onclick="generateLayout()" class="gen-btn w-full bg-lime-400 text-neutral-950 font-bold text-sm py-3.5 rounded-xl flex items-center justify-center gap-2"> <i data-lucide="sparkles" class="w-4 h-4"></i> Generate Layout </button> <button type="button" onclick="fillDummyData()" class="w-full bg-white/5 border border-white/10 text-white/60 text-xs py-2 rounded-lg hover:border-white/20 transition"> Isi Dummy Data </button>
      </div>
     </div><!-- Mode indicator -->
     <div id="modeIndicator" class="mt-6 hidden">
      <div class="border border-white/10 rounded-lg p-3 bg-white/[.02]">
       <p class="text-[10px] font-mono uppercase tracking-widest text-white/30 mb-1">Mode Terpilih</p>
       <p id="modeName" class="text-sm font-bold text-lime-400"></p>
       <p id="modeReason" class="text-xs text-white/40 mt-1"></p>
      </div>
     </div>
    </div><!-- OUTPUT PANEL -->
    <div class="flex-1 overflow-auto bg-neutral-900/50 p-6 lg:p-10">
     <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center">
      <div class="w-16 h-16 rounded-2xl bg-white/5 flex items-center justify-center mb-4">
       <i data-lucide="layers" class="w-7 h-7 text-white/20"></i>
      </div>
      <p class="text-white/30 text-sm font-mono">Isi konten &amp; generate</p>
      <p class="text-white/15 text-xs mt-1">Setiap kombinasi menghasilkan komposisi unik</p>
     </div>
     <div id="outputArea" class="hidden flex flex-col items-center justify-start gap-8"><iframe id="outputPreviewContainer" style="aspect-ratio:4/5;width:100%;max-width:420px;border-radius:12px;border:2px solid rgba(163,230,53,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.4);background:#fafaf9;display:block"></iframe>
      <div id="modeDetails" class="text-center text-white/50 text-xs max-w-md"></div>
     </div>
    </div>
   </div>
   <script>
const defaultConfig = {
  app_title: 'AI Layout Generator',
  background_color: '#0a0a0a',
  accent_color: '#a3e635',
  text_color: '#e5e5e5',
  font_family: 'DM Sans',
  font_size: 14
};

function applyConfig(cfg) {
  const t = document.getElementById('appTitle');
  if (t) t.textContent = cfg.app_title || defaultConfig.app_title;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (cfg) => applyConfig(cfg),
  mapToCapabilities: (cfg) => ({
    recolorables: [
      { get:()=>cfg.background_color||defaultConfig.background_color, set:(v)=>{cfg.background_color=v;window.elementSdk.setConfig({background_color:v})} },
      { get:()=>cfg.accent_color||defaultConfig.accent_color, set:(v)=>{cfg.accent_color=v;window.elementSdk.setConfig({accent_color:v})} },
      { get:()=>cfg.text_color||defaultConfig.text_color, set:(v)=>{cfg.text_color=v;window.elementSdk.setConfig({text_color:v})} }
    ],
    borderables: [],
    fontEditable: { get:()=>cfg.font_family||defaultConfig.font_family, set:(v)=>{cfg.font_family=v;window.elementSdk.setConfig({font_family:v})} },
    fontSizeable: { get:()=>cfg.font_size||defaultConfig.font_size, set:(v)=>{cfg.font_size=v;window.elementSdk.setConfig({font_size:v})} }
  }),
  mapToEditPanelValues: (cfg) => new Map([
    ['app_title', cfg.app_title || defaultConfig.app_title]
  ])
});

// ============ IMAGE HANDLER ============
let selectedImageData = '';

document.getElementById('inp-gambar-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    selectedImageData = event.target.result;
    document.getElementById('previewImg').src = selectedImageData;
    document.getElementById('imagePreview').classList.remove('hidden');
    document.getElementById('fileLabel').textContent = file.name;
    lucide.createIcons();
  };
  reader.readAsDataURL(file);
});

function clearImage() {
  selectedImageData = '';
  document.getElementById('inp-gambar-file').value = '';
  document.getElementById('imagePreview').classList.add('hidden');
  document.getElementById('fileLabel').textContent = 'Pilih Gambar...';
}

function fillDummyData() {
  document.getElementById('inp-judul').value = 'Revolusi Digital Dimulai dari Sini';
  document.getElementById('inp-subjudul').value = 'Transformasi bisnis Anda dengan teknologi terdepan';
  document.getElementById('inp-deskripsi').value = 'Kami menyediakan solusi lengkap untuk mempercepat transformasi digital perusahaan Anda. Dari strategi hingga implementasi, tim expert kami siap membantu mencapai tujuan bisnis Anda.';
  document.getElementById('inp-cta').value = 'Mulai Sekarang';
  document.getElementById('inp-info').value = 'POWERED BY AI';
}

// ============ COMPOSITION ENGINE ============

function analyzeContent(data) {
  const textStrength = (data.judul.length > 20 ? 2 : 1) + (data.deskripsi.length > 80 ? 2 : 1);
  const hasImage = data.gambar.length > 5;
  const contentDensity = data.judul.length + data.subjudul.length + data.deskripsi.length;
  return { textStrength, hasImage, contentDensity };
}

function chooseMode(analysis, hash) {
  const { textStrength, hasImage, contentDensity } = analysis;

  if (contentDensity > 200) return { mode: 'COMPRESSED', reason: 'Konten padat — spacing dipadatkan untuk keterbacaan optimal' };
  if (textStrength >= 3 && hash % 2 === 0) return { mode: 'STACKED', reason: 'Teks kuat — headline diperbesar dengan komposisi vertikal dramatis' };
  if (textStrength >= 3) return { mode: 'ASYMMETRIC', reason: 'Teks kuat — layout asimetris untuk visual weight yang dinamis' };
  if (hasImage && hash % 2 === 0) return { mode: 'OFFSET', reason: 'Visual kuat — elemen digeser untuk komposisi dinamis' };
  if (hasImage) return { mode: 'FLOATING', reason: 'Visual kuat — elemen mengambang dengan overlap halus' };

  const modes = ['OFFSET','STACKED','ASYMMETRIC','FLOATING','COMPRESSED'];
  return { mode: modes[hash % 5], reason: 'Mode dipilih berdasarkan variasi konten' };
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function imgBlock(url, cls='') {
  if (!url || url.length < 5) {
    return `<div class="${cls} bg-gradient-to-br from-neutral-200 to-neutral-300 flex items-center justify-center"><svg width="48" height="48" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
  }
  return `<img src="${url}" alt="Visual utama" loading="lazy" onerror="this.style.background='#e5e5e5';this.alt='Gambar tidak tersedia';this.src=''" class="${cls} object-cover bg-neutral-200">`;
}

function generateLayout() {
  const d = {
    judul: document.getElementById('inp-judul').value || 'Headline Utama',
    subjudul: document.getElementById('inp-subjudul').value || '',
    deskripsi: document.getElementById('inp-deskripsi').value || '',
    cta: document.getElementById('inp-cta').value || 'Mulai Sekarang',
    info: document.getElementById('inp-info').value || '',
    gambar: selectedImageData || '',
  };
  const accent = document.getElementById('inp-accent').value;
  const bg = document.getElementById('inp-bg').value;

  const analysis = analyzeContent(d);
  const hash = simpleHash(d.judul + d.subjudul + d.deskripsi + Date.now().toString().slice(-4));
  const { mode, reason } = chooseMode(analysis, hash);

  document.getElementById('modeIndicator').classList.remove('hidden');
  document.getElementById('modeName').textContent = mode;
  document.getElementById('modeReason').textContent = reason;

  const output = document.getElementById('outputArea');
  const empty = document.getElementById('emptyState');
  empty.classList.add('hidden');
  output.classList.remove('hidden');

  document.getElementById('modeDetails').textContent = reason;

  const infoTag = d.info ? `<span style="color:${accent};border-color:${accent}" class="inline-block text-[10px] font-mono uppercase tracking-[.2em] border px-3 py-1 rounded-full">${d.info}</span>` : '';
  const subLine = d.subjudul ? `<p class="text-neutral-500 text-base leading-relaxed">${d.subjudul}</p>` : '';
  const descBlock = d.deskripsi ? `<p class="text-neutral-400 text-sm leading-relaxed">${d.deskripsi}</p>` : '';
  const ctaBtn = `<button style="background:${accent};color:#111" class="px-7 py-3 rounded-full text-sm font-bold tracking-wide hover:opacity-90 transition">${d.cta}</button>`;

  let html = '';

  if (mode === 'OFFSET') {
    html = `
    <div style="background:${bg};border-radius:12px;overflow:hidden;width:100%;height:100%;display:flex;flex-direction:column;padding:24px 20px;gap:12px;box-sizing:border-box;font-family:'DM Sans',sans-serif;color:#111">
      <div style="flex:0 0 auto">${infoTag}</div>
      <h2 style="font-family:'Instrument Serif',serif;font-size:22px;font-weight:700;line-height:1.1;margin:0;flex:1">${d.judul}</h2>
      ${subLine ? `<div style="font-size:13px;color:#666;margin:0;flex:0 0 auto">${subLine}</div>` : ''}
      ${descBlock ? `<div style="font-size:11px;color:#999;line-height:1.3;margin:0;flex:0 0 auto;max-height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${descBlock}</div>` : ''}
      <div style="flex:0 0 auto;padding-top:8px">${ctaBtn}</div>
    </div>`;
  }

  else if (mode === 'STACKED') {
    html = `
    <div style="background:${bg};border-radius:12px;overflow:hidden;width:100%;height:100%;display:flex;flex-direction:column;box-sizing:border-box;font-family:'DM Sans',sans-serif;color:#111">
      <div style="flex:1;overflow:hidden;position:relative">
        ${imgBlock(d.gambar,'w-full h-full')}
        <div style="position:absolute;inset:0;background:linear-gradient(to top,${bg} 15%,transparent 70%)"></div>
      </div>
      <div style="flex:1;padding:20px;display:flex;flex-direction:column;justify-content:flex-end;gap:8px">
        <div>${infoTag}</div>
        <h2 style="font-family:'Instrument Serif',serif;font-size:28px;font-weight:700;line-height:1;margin:0">${d.judul}</h2>
        ${subLine ? `<div style="font-size:13px;color:#666">${subLine}</div>` : ''}
        ${descBlock ? `<div style="font-size:11px;color:#999;line-height:1.3;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1)">${descBlock}</div>` : ''}
        <div style="padding-top:8px">${ctaBtn}</div>
      </div>
    </div>`;
  }

  else if (mode === 'ASYMMETRIC') {
    html = `
    <div style="background:${bg};border-radius:12px;overflow:hidden;width:100%;height:100%;display:flex;flex-direction:column;padding:24px 20px;gap:16px;box-sizing:border-box;font-family:'DM Sans',sans-serif;color:#111">
      <div>${infoTag}</div>
      <h2 style="font-family:'Instrument Serif',serif;font-size:22px;font-weight:700;line-height:1.1;margin:0;flex:1">${d.judul}</h2>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:8px">
        ${subLine ? `<div style="font-size:13px;color:#666">${subLine}</div>` : ''}
        ${descBlock ? `<div style="font-size:11px;color:#999;line-height:1.3">${descBlock}</div>` : ''}
      </div>
      <div>${ctaBtn}</div>
    </div>`;
  }

  else if (mode === 'FLOATING') {
    html = `
    <div style="background:${bg};border-radius:12px;overflow:hidden;width:100%;height:100%;display:flex;flex-direction:column;padding:24px 20px;box-sizing:border-box;font-family:'DM Sans',sans-serif;color:#111;position:relative">
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;position:relative;z-index:10">
        <div>${infoTag}</div>
        <h2 style="font-family:'Instrument Serif',serif;font-size:22px;font-weight:700;line-height:1.1;margin:0">${d.judul}</h2>
        ${subLine ? `<div style="font-size:13px;color:#666">${subLine}</div>` : ''}
        ${descBlock ? `<div style="font-size:11px;color:#999;line-height:1.3">${descBlock}</div>` : ''}
      </div>
      <div style="position:absolute;bottom:20px;right:20px;width:120px;height:120px;border-radius:8px;overflow:hidden;opacity:0.6">
        ${imgBlock(d.gambar,'')}
      </div>
      <div style="flex:0 0 auto;position:relative;z-index:10">${ctaBtn}</div>
    </div>`;
  }

  else if (mode === 'COMPRESSED') {
    html = `
    <div style="background:${bg};border-radius:12px;overflow:hidden;width:100%;height:100%;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;font-family:'DM Sans',sans-serif;color:#111;gap:10px">
      <div>${infoTag}</div>
      <h2 style="font-family:'Instrument Serif',serif;font-size:18px;font-weight:700;line-height:1.1;margin:0">${d.judul}</h2>
      ${d.subjudul ? `<p style="font-size:12px;color:#666;margin:0;line-height:1.3">${d.subjudul}</p>` : ''}
      ${d.deskripsi ? `<p style="font-size:10px;color:#999;margin:0;line-height:1.3;border-top:1px solid rgba(0,0,0,0.1);padding-top:8px">${d.deskripsi}</p>` : ''}
      <div style="padding-top:8px">${ctaBtn}</div>
    </div>`;
  }

  // Render ke iframe
  const iframe = document.getElementById('outputPreviewContainer');
  const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
  iframeDoc.open();
  iframeDoc.write(html);
  iframeDoc.close();
}

document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
</script>
