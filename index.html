    .poster-canvas {

    .poster-wrapper {

    input[type="color"] {

      border: none;
      cursor: pointer;

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }

      color: #888;
      margin-bottom: 6px;

    .field-input {

      width: 100%;

      border: 1px solid #e0e0dc;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }
    .field-input:focus { border-color: #aaa; }
    .field-input::placeholder { color: #bbb; }
    textarea.field-input { resize: vertical; min-height: 70px; }

      text-align: center;

    .poster-subheadline {

      font-style: italic;
      font-size: 32px;
      line-height: 1.3;
      color: #1a1a1a;
      z-index: 2;
      text-align: center;
    }
    .poster-hero {

      top: 310px;
      left: 50px;
      right: 50px;
      height: 680px;
      z-index: 2;
      overflow: hidden;
      border-radius: 32px;
    }
    .poster-hero img {

      height: 100%;
      object-fit: contain;
      border-radius: 32px;
    }
    .poster-hero::after {
      content: '';

      top: 0;
      left: 0;
      right: 0;
      bottom: 0;

      pointer-events: none;
      border-radius: 32px;
    }

      height: 100%;

      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: #bbb;
      border: 2px dashed #ddd;
      background: #f9f9f7;
